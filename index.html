<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <article data-testid="test-todo-card" class="card">

        <!-- Title -->
        <h2 data-testid="test-todo-title" id="title">
            Todo: Finalize Project Proposal
        </h2>

        <!-- Description -->
        <div data-testid="test-todo-collapsible-section" id="collapsible-section" class="collapsed">
            <p id="description" class="description">
                Review feedback and update the todo budget.
            </p>
        </div>

        <button data-testid="test-todo-expand-toggle" id="expand-btn" aria-expanded="false"
            aria-controls="collapsible-section">
            Show More
        </button>

        <!-- Priority -->
        <div class="priority-wrapper">
            <span data-testid="test-todo-priority-indicator" id="priority-indicator"></span>

            <strong data-testid="test-todo-priority" id="priority-text" class="priority">
                High
            </strong>
        </div>

        <!-- Dates -->
        <div class="dates">
            <time data-testid="test-todo-due-date" datetime="2026-03-01T18:00">
                Due Mar 1, 2026
            </time>

            <time data-testid="test-todo-time-remaining" id="time-remaining" aria-live="polite">
                Loading...
            </time>
            <span data-testid="test-todo-overdue-indicator" id="overdue-indicator" class="overdue hidden">
                Overdue
            </span>
        </div>

        <!-- Status + Checkbox -->
        <div class="center">
            <span data-testid="test-todo-status" id="status" class="status pending">
                Pending
            </span>

            <!-- STATUS DROPDOWN -->
            <select data-testid="test-todo-status-control" id="status-control" aria-label="Change task status">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>
            <div class="checkbox">
                <label>
                    <input type="checkbox" id="toggle" data-testid="test-todo-complete-toggle" />
                    Mark as done
                </label>
            </div>
        </div>


        <!-- Tags -->
        <ul data-testid="test-todo-tags" class="tags">
            <li data-testid="test-todo-tag-work">Work</li>
            <li data-testid="test-todo-tag-urgent">Urgent</li>
        </ul>

        <!-- Buttons -->
        <div class="buttons">
            <button data-testid="test-todo-edit-button" class="edit-button">Edit</button>
            <button data-testid="test-todo-delete-button" class="delete-button">Delete</button>
        </div>

    </article>
    <!-- Edit Form -->
    <form data-testid="test-todo-edit-form" id="edit-form" class="card hidden">

        <label for="edit-title">Title</label>
        <input id="edit-title" name="title" data-testid="test-todo-edit-title-input" />

        <label for="edit-description">Description</label>
        <textarea id="edit-description" name="description" data-testid="test-todo-edit-description-input"></textarea>

        <label for="edit-priority">Priority</label>
        <select id="edit-priority" name="priority" data-testid="test-todo-edit-priority-select">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <label for="edit-date">
            Due Date
        </label>
        <input type="datetime-local" id="edit-date" data-testid="test-todo-edit-due-date-input" />

        <div class="buttons">
            <button type="button" data-testid="test-todo-save-button" id="save-btn">Save</button>
            <button type="button" data-testid="test-todo-cancel-button" id="cancel-btn">Cancel</button>
        </div>

    </form>

    <script src="script.js"></script>
</body>

</html>
