<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article data-testid="test-todo-card" class="card">

        <!-- Title -->
        <h2 data-testid="test-todo-title" id="title">
            Todo: Finalize Project Proposal
        </h2>

        <!-- Description -->
        <p data-testid="test-todo-description" id="description" class="description">
            Review feedback and update the todo budget.
        </p>

        <!-- Priority -->
        <strong data-testid="test-todo-priority" class="priority">
            High Priority
        </strong>

        <!-- Dates -->
        <div class="dates">
            <time data-testid="test-todo-due-date" datetime="2026-03-01T18:00">
                Due Mar 1, 2026
            </time>

            <time data-testid="test-todo-time-remaining" id="time-remaining" aria-live="polite">
                Loading...
            </time>
        </div>

        <!-- Status + Checkbox -->
        <div class="center">
            <span data-testid="test-todo-status" id="status" class="status pending">
                Pending
            </span>

            <label>
                <input type="checkbox" id="toggle" data-testid="test-todo-complete-toggle" />
                Mark as complete
            </label>
        </div>

        <!-- Tags -->
        <ul data-testid="test-todo-tags" class="tags">
            <li data-testid="test-todo-tag-work">Work</li>
            <li data-testid="test-todo-tag-urgent">Urgent</li>
        </ul>

        <!-- Buttons -->
        <div class="buttons">
            <button data-testid="test-todo-edit-button" class="edit-button">Edit</button>
            <button data-testid="test-todo-delete-button">Delete</button>
        </div>

        <div id="edit-modal" class="modal hidden">
            <div class="modal-content">
                <input type="text" id="edit-input" placeholder="Edit todo title" />

                <div class="modal-buttons">
                    <button id="cancel-edit">Cancel</button>
                    <button id="save-edit">OK</button>
                </div>
            </div>
        </div>
    </article>

    <script src="script.js"></script>
</body>

</html>
